services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: interview-regulator-frontend:latest
    container_name: interview-regulator-app
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
